version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: atom-maintenance-postgres
    env_file:
      - ../../configs/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: atom-maintenance-redis
    env_file:
      - ../../configs/.env
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  simulator:
    build:
      context: ../..
      dockerfile: deployments/docker/simulator.Dockerfile
    container_name: atom-maintenance-simulator
    ports:
      - "8090:8090"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: