version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: atom-maintenance-postgres-test
    env_file:
      - ../../configs/.env.test
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: ${POSTGRES_INTERVAL:-5s}
      timeout: ${POSTGRES_TIMEOUT:-3s}
      retries: ${POSTGRES_RETRIES:-10}
      start_period: 5s
    restart: no
